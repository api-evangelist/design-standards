aid: design-standards
name: Design Standards
description: >-
  Design Standards encompasses the frameworks, guidelines, and best practices
  used in product, interface, and system design to ensure consistency,
  usability, and accessibility. Includes API design guidelines, naming and
  format conventions, accessibility conformance, deprecation policy, and
  governance practices.
